[pytest]
# Run tests in parallel across CPU cores by default (pytest-xdist). Each worker
# is a separate process, so the module-level parse caches are per-worker and
# every write goes to a per-test tmp/scratch dir - no cross-test races. Full
# suite: ~2m40s parallel vs ~8m serial on a 24-core box. Override with `-n0`
# (or `-p no:xdist`) for serial/debugging. Requires `pip install pytest-xdist`
# (see requirements-dev.txt).
addopts = -n auto
markers =
    slow: long-running tests (real-board global route); deselect with -m "not slow"
